name: tsc, eslint, prettier, and unit tests on pull requests to main branch

on:
  pull_request:
    branches:
      - main

jobs:
  pr-checks:
    name: pr-checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Install dependencies
        run: yarn

      - name: Invoke prisma generate
        run: yarn prisma generate

      - name: Check tsc
        run: yarn typecheck

      - name: Eslint check
        run: yarn lint

      - name: Unit tests
        run: yarn test

      - name: Prettier
        run: yarn exec prettier -- . -c
